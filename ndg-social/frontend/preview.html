<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보고서 미리보기 — NDG Report</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/slides.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body style="margin:0;overflow:hidden">

<div class="preview-layout">

  <!-- 컨트롤 바 -->
  <div class="preview-controls" style="position:relative">
    <button class="btn btn--ghost btn--sm" style="color:white" onclick="prevSlide()">◀</button>
    <span class="slide-counter" id="slide-counter">1 / 8</span>
    <button class="btn btn--ghost btn--sm" style="color:white" onclick="nextSlide()">▶</button>
    <div class="preview-controls__actions">
      <a id="btn-edit" href="#" class="btn btn--secondary btn--sm">← 편집으로</a>
      <button class="btn btn--accent btn--sm" onclick="exportPptx()" id="btn-export-pptx">
        PPT 내보내기
      </button>
      <button class="btn btn--accent btn--sm" onclick="exportPdf()" id="btn-export">
        PDF 내보내기
      </button>
      <button class="btn btn--primary btn--sm" onclick="approveAndExport()" id="btn-approve">
        승인 & PDF 저장
      </button>
    </div>
  </div>

  <!-- 슬라이드 스테이지 -->
  <div class="slide-stage" style="flex:1;padding:var(--space-6)">
    <div class="slide-wrapper" id="slide-wrapper">
      <div class="slide-canvas" id="slide-canvas">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;
          color:white;font-size:24px;opacity:0.4">로딩 중...</div>
      </div>
    </div>
  </div>

  <!-- 필름스트립 -->
  <div class="slide-filmstrip" id="filmstrip">
    <!-- JS로 동적 생성 -->
  </div>

</div>

<!-- 키보드 단축키 안내 -->
<div style="position:fixed;bottom:var(--space-4);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.6);color:rgba(255,255,255,0.6);
  padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);
  font-size:var(--font-size-xs)">
  ← → 키로 슬라이드 이동 · ESC 편집으로 돌아가기
</div>

<div id="toast-container"></div>
<script src="/static/js/api.js?v=8"></script>
<script src="/static/js/slides.js?v=17"></script>
<script src="/static/js/preview.js?v=13"></script>
<script src="/static/js/export.js?v=4"></script>
</body>
</html>
